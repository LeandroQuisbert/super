<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>OptiMarket Pro - Analizador de Dispersión</title>
    <style>
        :root {
            --win: #27ae60;
            --info: #2980b9;
            --warning: #f39c12;
            --dark: #2c3e50;
            --bg: #f4f7f6;
        }

        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); margin: 0; padding: 20px; }
        .container { max-width: 1200px; margin: auto; }

        /* Panel de Control */
        .control-panel {
            background: white;
            padding: 25px;
            border-radius: 15px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            align-items: flex-end;
            margin-bottom: 30px;
        }

        .input-group { display: flex; flex-direction: column; gap: 5px; }
        select, input { padding: 10px; border: 1px solid #ddd; border-radius: 6px; min-width: 150px; }
        
        button { 
            padding: 10px 25px; background: var(--dark); color: white; border: none; 
            border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.3s;
        }
        button:hover { background: var(--info); }

        /* Grid de Resultados */
        .comparison-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(350px, 1fr));
            gap: 20px;
        }

        .product-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            border-top: 4px solid var(--info);
        }

        .card-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 15px; }
        .badge-dispersion { font-size: 0.7rem; padding: 3px 8px; border-radius: 10px; font-weight: bold; }
        .low-disp { background: #e8f6f3; color: #16a085; }
        .high-disp { background: #fef9e7; color: #d4ac0d; }

        /* Tabla de Mejores Precios */
        .price-table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        .price-table tr { border-bottom: 1px solid #eee; }
        .price-table td { padding: 8px 0; font-size: 0.9rem; }
        .price-val { font-weight: bold; color: var(--dark); text-align: right; }
        .best-deal { color: var(--win); font-size: 1.1rem; }

        .market-label { display: flex; align-items: center; gap: 5px; color: #666; }
        .winner-icon { font-size: 1rem; }

        .summary-bar {
            position: fixed; bottom: 20px; right: 20px; background: var(--dark);
            color: white; padding: 15px 30px; border-radius: 50px; box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="control-panel">
        <div class="input-group">
            <label>Producto</label>
            <input type="text" id="prodName" placeholder="Ej: Leche, Aceite...">
        </div>
        <div class="input-group">
            <label>Tipo/Variedad</label>
            <select id="prodType">
                <option value="Entera">Entera / Normal</option>
                <option value="Semidesnatada">Semidesnatada / Light</option>
                <option value="Desnatada">Desnatada / Zero</option>
                <option value="Extra">Premium / Extra</option>
            </select>
        </div>
        <div class="input-group">
            <label>Marca</label>
            <select id="prodBrand">
                <option value="Marca Blanca">Marca Blanca (Ahorro)</option>
                <option value="Cremosita">Cremosita (Media)</option>
                <option value="BioPlus">BioPlus (Alta Calidad)</option>
                <option value="PremiumGold">PremiumGold</option>
            </select>
        </div>
        <button onclick="analyzeProduct()">Analizar Precios</button>
    </div>

    <div class="comparison-grid" id="grid">
        </div>
</div>

<div class="summary-bar" id="totalSaved" style="display:none">
    Ahorro Total Optimizado: <span id="saveVal">0.00</span>€
</div>

<script>
    const supermarkets = ["Mercadona", "Carrefour", "Lidl", "Alcampo", "Aldi", "Dia", "Eroski", "El Corte Inglés"];
    let totalSaved = 0;

    function analyzeProduct() {
        const name = document.getElementById('prodName').value || "Producto";
        const type = document.getElementById('prodType').value;
        const brand = document.getElementById('prodBrand').value;

        // Simulador de dispersión basado en la marca
        // Marca blanca y Cremosita suelen tener baja dispersión (precios pactados o muy competitivos)
        let dispersionFactor = (brand === "Marca Blanca" || brand === "Cremosita") ? 0.05 : 0.25;
        let basePrice = (brand === "Marca Blanca") ? 0.90 : (brand === "Cremosita" ? 1.20 : 2.50);
        
        // Generar precios para 8 supermercados y elegir los 3 mejores
        let offers = supermarkets.map(s => {
            let variance = (Math.random() * (basePrice * dispersionFactor));
            return {
                market: s,
                price: parseFloat((basePrice + variance).toFixed(2))
            };
        }).sort((a, b) => a.price - b.price);

        const top3 = offers.slice(0, 3);
        const isLowDispersion = (top3[2].price - top3[0].price) < 0.10;

        renderCard(name, type, brand, top3, isLowDispersion);
        
        // Calcular ahorro simulado (diferencia entre el peor precio y el mejor)
        totalSaved += (offers[offers.length-1].price - top3[0].price);
        document.getElementById('totalSaved').style.display = 'block';
        document.getElementById('saveVal').innerText = totalSaved.toFixed(2);
    }

    function renderCard(name, type, brand, top3, isLowDispersion) {
        const grid = document.getElementById('grid');
        const card = document.createElement('div');
        card.className = 'product-card';
        
        const dispersionLabel = isLowDispersion ? 
            '<span class="badge-dispersion low-disp">BAJA DISPERSIÓN (Precios estables)</span>' : 
            '<span class="badge-dispersion high-disp">ALTA DISPERSIÓN (¡Compara!)</span>';

        card.innerHTML = `
            <div class="card-header">
                <div>
                    <strong style="font-size:1.2rem">${name}</strong><br>
                    <small>${brand} - ${type}</small>
                </div>
                ${dispersionLabel}
            </div>
            <table class="price-table">
                ${top3.map((o, i) => `
                    <tr>
                        <td class="market-label">
                            ${i === 0 ? '<span class="winner-icon">🏆</span>' : '<span>&nbsp;&nbsp;&nbsp;</span>'}
                            ${o.market}
                        </td>
                        <td class="price-val ${i === 0 ? 'best-deal' : ''}">${o.price.toFixed(2)}€</td>
                    </tr>
                `).join('')}
            </table>
            <p style="font-size:0.75rem; color:#999; margin-top:15px; font-style:italic">
                * El precio mínimo es idéntico en ${Math.floor(Math.random()*2)+1} establecimientos adicionales.
            </p>
        `;

        grid.prepend(card);
    }
</script>

</body>
</html>
